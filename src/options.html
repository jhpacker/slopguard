<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SlopGuard options</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
    padding: 20px;
    min-width: 320px;
  }
  h1 { margin: 0 0 4px; font-size: 18px; }
  p.tagline { color: #999; font-size: 12px; margin: 0 0 18px; }
  label {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    cursor: pointer;
    padding: 10px;
    background: #262626;
    border-radius: 6px;
    margin-bottom: 10px;
  }
  label:hover { background: #2e2e2e; }
  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    margin-top: 1px;
    cursor: pointer;
  }
  .label-text { flex: 1; }
  .label-title { font-weight: 600; font-size: 14px; }
  .label-desc { color: #aaa; font-size: 12px; margin-top: 4px; }
  .saved {
    color: #34c759;
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    margin-left: 4px;
  }
  .saved.show { opacity: 1; }
</style>
</head>
<body>
  <h1>SlopGuard <span class="saved" id="saved">✓ saved</span></h1>
  <p class="tagline">Detects AI-generated images on the pages you visit.</p>

  <label>
    <input type="checkbox" id="debugMode">
    <span class="label-text">
      <div class="label-title">Debug mode</div>
      <div class="label-desc">
        Print detection logs to the page and service-worker consoles, and
        show the rule + per-tier scores under every scanned image. Runs all
        tiers (including the slow watermark + visual models) on every image.
      </div>
    </span>
  </label>

  <label id="fastDebugLabel">
    <input type="checkbox" id="fastDebug">
    <span class="label-text">
      <div class="label-title">Fast debug mode</div>
      <div class="label-desc">
        Still show the per-tier debug table, but stop at the first tier that
        detects AI — exactly like normal scanning. Faster on image-heavy
        feeds; tiers skipped by the short-circuit show “(not reached)”.
      </div>
    </span>
  </label>

  <script src="options.js"></script>
</body>
</html>
